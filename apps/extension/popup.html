<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stashly Recall</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="shell">
      <header class="top">
        <div class="brand" aria-label="Stashly">
          <img src="onlyIcon.png" alt="Stashly" class="brand-img" />
          <h1>Stashly</h1>
        </div>
        <div class="top-actions">
          <button id="themeToggleBtn" class="ghost" type="button">Dark mode</button>
          <button id="logoutBtn" class="ghost hidden" type="button">Logout</button>
        </div>
      </header>

      <section id="authSection" class="card">
        <h2 id="authTitle">Sign in</h2>
        <form id="authForm">
          <label for="emailInput">Email</label>
          <input id="emailInput" type="email" required />
          <label for="passwordInput">Password</label>
          <input id="passwordInput" type="password" required minlength="8" />
          <button id="authSubmitBtn" class="primary" type="submit">Sign In</button>
        </form>
        <div class="divider" aria-hidden="true">or</div>
        <button id="googleAuthBtn" class="google" type="button">Continue with Google</button>
        <button id="toggleAuthBtn" class="linklike" type="button">
          No account? Sign up
        </button>
      </section>

      <section id="appSection" class="hidden">
        <div class="card">
          <label for="saveInput">Save link</label>
          <div class="row">
            <input id="saveInput" type="url" placeholder="https://example.com" />
            <button id="saveBtn" class="primary" type="button">Save</button>
          </div>
          <p id="saveStatus" class="status"></p>
        </div>

        <div class="card">
          <label for="searchInput">Search from saved</label>
          <form id="searchForm">
            <div class="row">
              <input id="searchInput" type="text" placeholder="shopping" />
              <button id="searchBtn" class="ghost" type="submit">Search</button>
            </div>
          </form>
          <div class="row actions-row">
            <button id="viewAllBtn" class="ghost" type="button">View All</button>
            <button id="backBtn" class="ghost hidden" type="button">Main</button>
          </div>
          <p id="searchStatus" class="status"></p>
          <div id="results" class="results"></div>
        </div>
      </section>
    </div>

    <div id="toast" class="toast hidden">deleted</div>

    <script src="popup.js"></script>
  </body>
</html>
