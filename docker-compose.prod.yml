services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: stashly_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: stashly
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d stashly"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/initdb:/docker-entrypoint-initdb.d:ro

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: stashly_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./apps/backend/.env
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/stashly?schema=public
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3001}
    ports:
      - "3000:3000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3000}
    container_name: stashly_web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3001:3000"

volumes:
  postgres_data: